<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FBDCE0" />
    <title>나는 어떤 간식? | 달콤 취향 간식 테스트</title>
    <meta
      name="description"
      content="7가지 질문으로 알아보는 나와 닮은 간식. 진함·발랄함·다정함으로 초콜릿·사탕·비스킷·마시멜로우·푸딩 중 나와 가장 가까운 하나를 찾아드려요. 1분이면 완료!"
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="나는 어떤 간식? | 달콤 취향 간식 테스트" />
    <meta
      property="og:description"
      content="7가지 질문으로 알아보는 나와 닮은 간식. 1분이면 5가지 간식 중 나와 가장 가까운 하나를 찾아드려요."
    />
    <meta property="og:site_name" content="나는 어떤 간식?" />
    <!-- 카카오톡/페이스북 등 일부 스크래퍼는 절대 URL을 요구한다. 배포 도메인이 정해지면 아래 두 이미지 경로를 절대 URL(https://도메인/og-image.jpg)로 바꾸는 것을 권장한다. -->
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/jpeg" />
    <!-- og:url은 실제 배포 도메인이 정해진 뒤 배포 스크립트에서 채운다. 임시 URL을 만들어 넣지 않는다. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="나는 어떤 간식? | 달콤 취향 간식 테스트" />
    <meta
      name="twitter:description"
      content="7가지 질문으로 알아보는 나와 닮은 간식. 1분이면 완료!"
    />
    <meta name="twitter:image" content="/og-image.jpg" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
